<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine KI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      background: #1f2937;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .header {
      background: #2563eb;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      height: 450px;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.4;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #374151;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="header">🤖 Meine KI</div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hallo 👋 Ich bin deine HTML-KI. Frag mich etwas!
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Schreibe etwas..." />
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');

    // ⚠️ Trage hier deinen OpenAI API Key ein
    const API_KEY = 'DEIN_OPENAI_API_KEY';

    function addMessage(text, sender) {
      const message = document.createElement('div');
      message.classList.add('message', sender);
      message.textContent = text;
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function askAI(prompt) {
      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4.1-mini',
            messages: [
              {
                role: 'system',
                content: 'Du bist eine KI die programmieren kann. Wenn der Nutzer nach Code fragt, antworte mit funktionierendem Code.'
              },
              {
                role: 'user',
                content: prompt
              }
            ],
            temperature: 0.7
          })
        });

        const data = await response.json();

        if (data.error) {
          return 'Fehler: ' + data.error.message;
        }

        return data.choices[0].message.content;
      } catch (error) {
        return 'Verbindungsfehler 🚨';
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();

      if (text === '') return;

      addMessage(text, 'user');
      input.value = '';

      addMessage('KI denkt nach... 🤖', 'bot');

      const loadingMessage = chatBox.lastChild;

      const response = await askAI(text);

      loadingMessage.textContent = response;
    }

    document.getElementById('userInput').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });
  </script>

</body>
</html>
